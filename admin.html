<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP Delícias - Admin V4</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#fff1f5;color:#222}
header{position:sticky;top:0;background:#fff;border-bottom:1px solid #ffd3df;z-index:9}
.top{max-width:1200px;margin:auto;padding:14px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.brand{display:flex;gap:12px;align-items:center}.logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#e91e63,#ffca28);display:grid;place-items:center;color:white;font-weight:900}
.wrap{max-width:1200px;margin:auto;padding:20px;display:grid;grid-template-columns:1fr 370px;gap:20px}.banner{width:100%;border-radius:24px;margin-bottom:16px}
.hero{background:linear-gradient(135deg,#e91e63,#ffca28);color:white;border-radius:24px;padding:24px}.hero h1{font-size:36px;margin:0 0 8px}
.btn{border:0;border-radius:13px;padding:10px 13px;font-weight:800;cursor:pointer;background:#e91e63;color:white}.btn.dark{background:#222}.btn.green{background:#16a34a}.btn.red{background:#dc2626}.btn.gray{background:#eee;color:#222}.btn:disabled{background:#aaa}
.field,input,select,textarea{width:100%;border:1px solid #ffd3df;border-radius:13px;padding:12px;margin:5px 0;background:#fff}
.cats{display:flex;gap:8px;overflow:auto;margin:14px 0}.cat{background:#fff;color:#222;border:1px solid #ffd3df;white-space:nowrap}.cat.active{background:#e91e63;color:white}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card,.box{background:#fff;border:1px solid #ffd3df;border-radius:22px;padding:14px;box-shadow:0 3px 12px #00000008}
.photo{height:105px;background:#ffe0ea;border-radius:18px;display:grid;place-items:center;font-size:42px}.tag{font-size:12px;color:#e91e63;font-weight:900}.desc{font-size:13px;color:#666;min-height:42px}.price{font-size:20px;font-weight:900}
.row{display:flex;justify-content:space-between;gap:10px;align-items:center}.item{border-bottom:1px solid #ffe0ea;padding:10px 0}.total{background:#fff1f5;border-radius:16px;padding:12px;margin-top:10px}
aside{position:sticky;top:85px;height:max-content}.small{font-size:13px;color:#666}.notice{display:none;background:#222;color:#fff;border-radius:18px;padding:14px;margin:14px 0}
.admin{max-width:1200px;margin:0 auto 30px;padding:20px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid #ffe0ea;padding:9px;text-align:left;vertical-align:top;font-size:14px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}.metric{background:#fff1f5;border-radius:18px;padding:14px}.metric b{font-size:22px}.status{border-radius:50px;padding:9px 12px;font-weight:800}.open{background:#dcfce7;color:#166534}.closed{background:#e5e7eb;color:#555}
@media print{body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{position:absolute;left:0;top:0;width:100%;background:white;color:black;padding:20px}}#printArea{display:none}
@media(max-width:900px){.wrap{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}aside{position:static}.cards{grid-template-columns:1fr 1fr}.hero h1{font-size:28px}}@media(max-width:560px){.grid{grid-template-columns:1fr}.cards{grid-template-columns:1fr}}

.adminControls{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.badge{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#fff1f5;color:#e91e63}
@media(max-width:700px){.table,.table tbody,.table tr,.table td,.table th{display:block;width:100%}.table tr{margin-bottom:12px;border:1px solid #ffd3df;border-radius:16px;padding:8px}.table th{display:none}.table td{border:0;padding:6px}}
</style></head>
<body>
<header><div class="top"><div class="brand"><div class="logo">MP</div><div><b style="font-size:22px">Painel MP Delícias</b><div class="small">Área administrativa</div></div></div><span id="storeStatus" class="status open">Admin</span></div></header><div id="avisoPedidoNovo" style="display:none;background:#16a34a;color:white;text-align:center;padding:12px;font-weight:900">🔔 Novo pedido recebido!</div>
<section id="loginAdmin" class="admin"><div class="box"><h2>🔐 Entrar no painel</h2><input id="adminSenha" class="field" type="password" placeholder="Senha do admin"><button class="btn dark" onclick="entrarAdmin()">Entrar</button><p class="small">Senha inicial: <b>mp123</b> — depois vamos trocar por senha forte</p></div></section>
<section id="admin" class="admin" style="display:none"><div class="box"><h2>🔐 Painel administrador MP Delícias</h2><div class="tabs"><button class="btn dark" onclick="tab='pedidos';renderAdmin()">Pedidos</button><button class="btn dark" onclick="tab='loja';renderAdmin()">Loja</button><button class="btn dark" onclick="tab='financeiro';renderAdmin()">Fechamento</button><button class="btn dark" onclick="tab='produtos';renderAdmin()">Produtos</button><button class="btn red" onclick="sairAdmin()">Sair</button></div><div id="adminContent"></div></div></section><div id="printArea"></div>
<script>
const db=window.supabase.createClient("https://kmhhvlvkaewinhfswdzy.supabase.co","sb_publishable_txROyphFSAhwp9us31hYxw_ufylL0in");
const WHATSAPP="553487196724",PIX="15978014612";const money=v=>Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
let tab='pedidos',orders=[],expense=0,deliveryFee=10,storeOpen=true,adminLogado=false,ultimoTotalPedidos=0,somAtivo=true,tempoEstimado='30 a 45 minutos';
let produtosPausados = JSON.parse(localStorage.getItem('produtosPausadosMP')||'[]');
const produtosAdmin = ['Mexidão da Casa','Combo Mexidão + Coca lata','Coxinha frango com Catupiry','Tapioca De Frango Especial','Macarrão G','Macarrão P','Omelete Misto','Sucos Naturais','Vitaminas','Bebidas'];
function alternarProduto(nome){
 if(produtosPausados.includes(nome)){produtosPausados=produtosPausados.filter(p=>p!==nome)}
 else{produtosPausados.push(nome)}
 localStorage.setItem('produtosPausadosMP',JSON.stringify(produtosPausados));
 renderAdmin();
}
function entrarAdmin(){if(document.getElementById('adminSenha').value==='mp123'){adminLogado=true;document.getElementById('loginAdmin').style.display='none';document.getElementById('admin').style.display='block';loadOrders();}else alert('Senha incorreta')}
function sairAdmin(){adminLogado=false;document.getElementById('admin').style.display='none';document.getElementById('loginAdmin').style.display='block'}
function tocarSomPedido(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=880;gain.gain.value=.12;osc.start();setTimeout(()=>{osc.stop();ctx.close()},350)}catch(e){}}
function verificarPedidoNovo(){
 if(orders.length>ultimoTotalPedidos&&ultimoTotalPedidos>0){
   if(somAtivo) tocarSomPedido();
   const aviso=document.getElementById('avisoPedidoNovo');
   if(aviso){aviso.style.display='block';setTimeout(()=>aviso.style.display='none',6000)}
 }
 ultimoTotalPedidos=orders.length
}
function alternarSom(){
 somAtivo=!somAtivo;
 alert(somAtivo?'Som de pedido ligado':'Som de pedido desligado');
 renderAdmin();
}
async function loadOrders(){const {data,error}=await db.from('pedidos').select('*').order('id',{ascending:false}).limit(100);if(!error){orders=data||[];verificarPedidoNovo();renderAdmin()}}
async function updateOrderStatus(id,status){const {error}=await db.from('pedidos').update({status}).eq('id',id);if(error){alert('Erro: '+error.message);return}loadOrders()}
function setOpen(v){storeOpen=v;document.getElementById('storeStatus').className='status '+(v?'open':'closed');document.getElementById('storeStatus').innerText=v?'Loja aberta':'Loja fechada'}
async function closeDay(){const valid=orders.filter(o=>o.status!='Cancelado'),total=valid.reduce((s,o)=>s+Number(o.total||0),0),lucro=total-Number(expense||0),hoje=new Date().toISOString().slice(0,10);const {error}=await db.from('fechamento').insert([{data_fechamento:hoje,total_vendas:total,gastos:Number(expense||0),lucro}]);if(error){alert('Erro ao fechar: '+error.message);return}setOpen(false);alert('Fechamento salvo e loja fechada!')}
function imprimirPedido(id){const o=orders.find(x=>String(x.id)===String(id));if(!o)return;const area=document.getElementById('printArea');area.style.display='block';area.innerHTML=`<h1>MP Delícias</h1><h2>Pedido #${o.id}</h2><p><b>Cliente:</b> ${o.cliente||''}</p><p><b>Telefone:</b> ${o.telefone||''}</p><p><b>Endereço:</b> ${o.endereco||''}</p><hr><p><b>Itens:</b><br>${o.itens||''}</p><p><b>Pagamento:</b> ${o.pagamento||''}</p><p><b>Total:</b> ${money(o.total)}</p><p><b>Status:</b> ${o.status||''}</p>`;window.print();setTimeout(()=>area.style.display='none',500)}
function reciboCliente(id){const o=orders.find(x=>String(x.id)===String(id));if(!o)return;const texto=`🧾 RECIBO MP DELÍCIAS%0A%0APedido: #${o.id}%0ACliente: ${o.cliente||''}%0AItens: ${o.itens||''}%0APagamento: ${o.pagamento||''}%0ATotal: ${money(o.total)}%0AStatus: ${o.status||''}%0A%0AObrigado pela preferência!`;window.open(`https://wa.me/${WHATSAPP}?text=${texto}`,'_blank')}
function renderAdmin(){const el=document.getElementById('adminContent');if(!el||!adminLogado)return;const valid=orders.filter(o=>o.status!='Cancelado'),total=valid.reduce((s,o)=>s+Number(o.total||0),0),pix=valid.filter(o=>o.pagamento=='PIX').reduce((s,o)=>s+Number(o.total||0),0),dinheiro=valid.filter(o=>o.pagamento=='Dinheiro').reduce((s,o)=>s+Number(o.total||0),0),cartao=valid.filter(o=>o.pagamento=='Cartão').reduce((s,o)=>s+Number(o.total||0),0);if(tab=='pedidos')el.innerHTML=`<div class="adminControls"><button class="btn green" onclick="loadOrders()">Atualizar pedidos</button><button class="btn" onclick="alternarSom()">Som: ${somAtivo?'Ligado':'Desligado'}</button><button class="btn gray" onclick="window.open('./','_blank')">Ver site cliente</button></div><div class="cards"><div class="metric">Pedidos<br><b>${orders.length}</b></div><div class="metric">Vendas<br><b>${money(total)}</b></div><div class="metric">Recebidos<br><b>${orders.filter(o=>o.status=='Recebido').length}</b></div><div class="metric">Preparando<br><b>${orders.filter(o=>o.status=='Preparando').length}</b></div></div><table class="table"><tr><th>Nº</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Pagamento</th><th>Status</th><th>Ações</th></tr>${orders.map(o=>`<tr><td>#${o.id}</td><td>${o.cliente||''}<div class="small">${o.telefone||''}<br>${o.endereco||''}</div></td><td>${o.itens||''}</td><td>${money(o.total)}</td><td>${o.pagamento||''}</td><td><select onchange="updateOrderStatus(${o.id},this.value)"><option ${o.status=='Recebido'?'selected':''}>Recebido</option><option ${o.status=='Preparando'?'selected':''}>Preparando</option><option ${o.status=='Saiu para entrega'?'selected':''}>Saiu para entrega</option><option ${o.status=='Entregue'?'selected':''}>Entregue</option><option ${o.status=='Cancelado'?'selected':''}>Cancelado</option></select></td><td><button class="btn gray" onclick="imprimirPedido(${o.id})">Imprimir</button><br><button class="btn green" onclick="reciboCliente(${o.id})">Recibo</button></td></tr>`).join('')}</table>`;if(tab=='loja')el.innerHTML=`<div class="cards"><button class="btn green" onclick="setOpen(true)">Abrir loja</button><button class="btn red" onclick="setOpen(false)">Fechar loja</button><button class="btn" onclick="deliveryFee=0;renderAdmin()">Entrega grátis</button><button class="btn" onclick="deliveryFee=10;renderAdmin()">Taxa R$10</button></div><p><b>Taxa atual:</b> ${deliveryFee==0?'Grátis':money(deliveryFee)}</p><label>Tempo estimado para informar ao cliente</label><input class="field" value="${tempoEstimado}" onchange="tempoEstimado=this.value"><p><b>WhatsApp:</b> +55 34 8719-6724</p><p><b>PIX:</b> ${PIX}</p>`;if(tab=='produtos')el.innerHTML=`<h3>📦 Produtos indisponíveis</h3><p class="small">Controle inicial local. Na próxima versão ligamos isso ao banco para refletir no site do cliente automaticamente.</p><table class="table"><tr><th>Produto/Categoria</th><th>Status</th><th>Ação</th></tr>${produtosAdmin.map(p=>`<tr><td>${p}</td><td>${produtosPausados.includes(p)?'<span class="badge">Pausado</span>':'<span class="badge">Ativo</span>'}</td><td><button class="btn ${produtosPausados.includes(p)?'green':'red'}" onclick="alternarProduto('${p}')">${produtosPausados.includes(p)?'Ativar':'Pausar'}</button></td></tr>`).join('')}</table>`;
if(tab=='financeiro')el.innerHTML=`<div class="cards"><div class="metric">Total<br><b>${money(total)}</b></div><div class="metric">PIX<br><b>${money(pix)}</b></div><div class="metric">Dinheiro<br><b>${money(dinheiro)}</b></div><div class="metric">Cartão<br><b>${money(cartao)}</b></div></div><label>Gastos do dia</label><input class="field" type="number" value="${expense}" onchange="expense=Number(this.value);renderAdmin()"><h3>Lucro estimado: ${money(total-expense)}</h3><button class="btn green" onclick="closeDay()">Fechar dia e salvar</button>`}
setInterval(()=>{if(adminLogado)loadOrders()},15000);
</script></body></html>
