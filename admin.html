async function uploadFotoProduto(id){

 if(!input || !input.files || !input.files[0]){alert('Escolha uma imagem primeiro');return}
 const file=input.files[0];
 const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
 const path='produto_'+id+'_'+Date.now()+'.'+ext;
 const {error:uploadError}=await db.storage.from('produtos').upload(path,file,{cacheControl:'3600',upsert:true});
 if(uploadError){alert('Erro ao enviar imagem: '+uploadError.message);console.log(uploadError);return}
 const {data}=db.storage.from('produtos').getPublicUrl(path);
 const publicUrl=data.publicUrl;
 const {error:updateError}=await db.from('produtos').update({foto:publicUrl,storage_path:path}).eq('id',id);
 if(updateError){alert('Imagem enviada, mas erro ao salvar no produto: '+updateError.message);return}
 alert('Foto do produto atualizada!');
 await carregarProdutosAdminBanco();
 renderAdmin();
}

function exportarPedidosCSV(){
 const linhas=[['id','cliente','telefone','endereco','itens','pagamento','total','status']];
 orders.forEach(o=>linhas.push([o.id,o.cliente||'',o.telefone||'',o.endereco||'',o.itens||'',o.pagamento||'',o.total||0,o.status||'']));
 const csv=linhas.map(l=>l.map(c=>`"${String(c).replaceAll('"','""')}"`).join(',')).join('\n');
 const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='pedidos_mp_delicias.csv';
 a.click();
}

let dataFiltroHoje = new Date().toISOString().slice(0,10);

function dataPedidoHoje(o){
 const campo=o.criado_em || o.created_at || o.data || '';
 if(!campo) return true;
 return String(campo).slice(0,10)===dataFiltroHoje;
}
function pedidosDoDia(){
 return orders.filter(o=>dataPedidoHoje(o));
}
async function carregarFechamentos(){
 const {data,error}=await db.from('fechamento').select('*').order('id',{ascending:false}).limit(30);
 if(!error) fechamentos=data||[];
}
async function encerrarDia(){
 const lista=pedidosDoDia().filter(o=>o.status!='Cancelado');
 const total=lista.reduce((s,o)=>s+Number(o.total||0),0);
 const pix=lista.filter(o=>o.pagamento=='PIX').reduce((s,o)=>s+Number(o.total||0),0);
 const cartao=lista.filter(o=>o.pagamento=='Cartão').reduce((s,o)=>s+Number(o.total||0),0);
 const dinheiro=lista.filter(o=>o.pagamento=='Dinheiro').reduce((s,o)=>s+Number(o.total||0),0);
 const gastos=Number(expense||0);
 const lucro=total-gastos;
 const obs=prompt('Observação do fechamento (opcional):','Fechamento do dia MP Delícias') || '';
 if(!confirm(`Encerrar o dia?\n\nPedidos: ${lista.length}\nTotal: ${money(total)}\nGastos: ${money(gastos)}\nLucro: ${money(lucro)}\n\nDepois disso o painel do dia começa zerado.`)) return;
 const {error}=await db.from('fechamento').insert([{
   data_fechamento:dataFiltroHoje,
   total_vendas:total,
   total_pedidos:lista.length,
   total_pix:pix,
   total_cartao:cartao,
   total_dinheiro:dinheiro,
   gastos:gastos,
   lucro:lucro,
   observacao:obs
 }]);
 if(error){alert('Erro ao salvar fechamento: '+error.message);console.log(error);return}
 localStorage.setItem('ultimoFechamentoMP',dataFiltroHoje);
 expense=0;
 await carregarFechamentos();
 alert('Fechamento salvo! O painel do dia foi reiniciado.');
 renderAdmin();
}
function diaJaFechado(){
 return localStorage.getItem('ultimoFechamentoMP')===dataFiltroHoje;
}


let notificacoesMP=[];
let ultimoIdNotificacao=0;
function tocarSomNotificacao(){
 try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=950;g.gain.value=.16;o.start();setTimeout(()=>{o.frequency.value=650},180);setTimeout(()=>{o.stop();ctx.close()},520)}catch(e){}
}
async function carregarNotificacoes(){
 const {data,error}=await db.from('notificacoes').select('*').order('id',{ascending:false}).limit(20);
 if(error){console.log(error);return}
 const novas=data||[];
 if(novas.length&&ultimoIdNotificacao&&novas[0].id>ultimoIdNotificacao){
   tocarSomNotificacao();
   mostrarAvisoPedido(novas[0].mensagem||'Novo pedido recebido');
 }
 if(novas.length)ultimoIdNotificacao=novas[0].id;
 notificacoesMP=novas;
 renderAdmin();
}
function mostrarAvisoPedido(msg){
 const aviso=document.getElementById('avisoPedidoNovo');
 if(aviso){aviso.innerText='🔔 '+msg;aviso.style.display='block';setTimeout(()=>aviso.style.display='none',8000)}
 if('Notification' in window&&Notification.permission==='granted')new Notification('MP Delícias',{body:msg});
}
async function pedirPermissaoNotificacao(){
 if(!('Notification' in window)){alert('Este navegador não suporta notificações.');return}
 const perm=await Notification.requestPermission();
 alert(perm==='granted'?'Notificações liberadas!':'Notificações não liberadas.');
}
async function marcarNotificacaoLida(id){await db.from('notificacoes').update({lida:true}).eq('id',id);await carregarNotificacoes();}
async function marcarTodasLidas(){await db.from('notificacoes').update({lida:true}).eq('lida',false);await carregarNotificacoes();}


let carrinhoPDV=[];
function addPDV(id,nome,preco){
 const e=carrinhoPDV.find(x=>x.id===id);
 if(e){e.qty++}else{carrinhoPDV.push({id,nome,preco:Number(preco||0),qty:1})}
 renderAdmin();
}
function menosPDV(id){
 const e=carrinhoPDV.find(x=>x.id===id);
 if(!e)return;
 e.qty--;
 if(e.qty<=0)carrinhoPDV=carrinhoPDV.filter(x=>x.id!==id);
 renderAdmin();
}
function totalPDV(){
 return carrinhoPDV.reduce((s,i)=>s+(Number(i.preco||0)*i.qty),0);
}
async function finalizarPDV(){
 if(!carrinhoPDV.length){alert('Adicione produtos na venda balcão');return}
 const pagamento=document.getElementById('pdvPagamento').value;
 const cliente=document.getElementById('pdvCliente').value || 'Venda balcão';
 const itens=carrinhoPDV.map(i=>`${i.qty}x ${i.nome}`).join(', ');
 const total=totalPDV();
 const pedido={cliente,telefone:'',endereco:'Venda balcão',itens,pagamento,total,status:'Entregue',tipo_venda:'Balcão'};
 const {error}=await db.from('pedidos').insert([pedido]);
 if(error){alert('Erro ao finalizar venda: '+error.message);console.log(error);return}
 alert('Venda balcão finalizada!');
 carrinhoPDV=[];
 await loadOrders();
 renderAdmin();
}
function imprimirPDV(){
 if(!carrinhoPDV.length){alert('Carrinho vazio');return}
 const area=document.getElementById('printArea');
 area.style.display='block';
 area.innerHTML=`<h1>MP Delícias</h1><h2>Venda balcão</h2><p>${carrinhoPDV.map(i=>`${i.qty}x ${i.nome} - ${money(i.preco*i.qty)}`).join('<br>')}</p><hr><h2>Total: ${money(totalPDV())}</h2>`;
 window.print();
 setTimeout(()=>area.style.display='none',500);
}

if(tab=='produtos')el.innerHTML=`<h3>📦 Produtos do cardápio</h3><p class="small">Pausar, editar preço e colocar foto produto por produto. Use link de imagem por enquanto.</p><div class="adminControls"><button class="btn green" onclick="carregarProdutosAdminBanco().then(renderAdmin)">Atualizar produtos</button><button class="btn" onclick="importarCardapioInicial()">Importar cardápio inicial</button></div><div class="box" style="margin:10px 0"><h3>Novo produto</h3><input id="novoNome" class="field" placeholder="Nome"><input id="novoCategoria" class="field" placeholder="Categoria"><input id="novoPreco" class="field" type="number" placeholder="Preço"><input id="novoEmoji" class="field" placeholder="Emoji ex: 🍝"><textarea id="novoDescricao" class="field" placeholder="Descrição"></textarea><button class="btn green" onclick="novoProdutoBanco()">Cadastrar produto</button></div><table class="table"><tr><th>Produto</th><th>Categoria</th><th>Preço</th><th>Foto</th><th>Status</th><th>Selos</th><th>Ação</th></tr>${produtosBanco.map(p=>`<tr><td><input class="field" value="${p.nome||''}" onchange="salvarProdutoBanco(${p.id},'nome',this.value)"><textarea class="field" onchange="salvarProdutoBanco(${p.id},'descricao',this.value)">${p.descricao||''}</textarea></td><td><input class="field" value="${p.categoria||''}" onchange="salvarProdutoBanco(${p.id},'categoria',this.value)"></td><td><input class="field" type="number" value="${p.preco||0}" onchange="salvarProdutoBanco(${p.id},'preco',this.value)"></td><td><input class="field" placeholder="Link da foto" value="${p.foto||''}" onchange="salvarProdutoBanco(${p.id},'foto',this.value)"><input id="fotoUpload_${p.id}" class="field" type="file" accept="image/*"><button class="btn green" onclick="uploadFotoProduto(${p.id})">Enviar foto</button>${p.foto?`<br><img src="${p.foto}" style="width:90px;height:70px;object-fit:cover;border-radius:10px;margin-top:6px">`:''}</td><td>${p.ativo?'<span class="badge">Ativo</span>':'<span class="badge">Pausado</span>'}</td><td><button class="btn gray" onclick="marcarBooleanProduto(${p.id},'destaque',${p.destaque===true})">${p.destaque?'Remover destaque':'Destaque'}</button><br><button class="btn gray" onclick="marcarBooleanProduto(${p.id},'promocao',${p.promocao===true})">${p.promocao?'Remover promoção':'Promoção'}</button></td><td><button class="btn ${p.ativo?'red':'green'}" onclick="alternarProdutoBanco(${p.id},${p.ativo})">${p.ativo?'Pausar':'Ativar'}</button></td></tr>`).join('')}</table>`;
if(tab=='notificacoes')el.innerHTML=`<h3>🔔 Central de notificações</h3><div class="adminControls"><button class="btn green" onclick="pedirPermissaoNotificacao()">Liberar aviso do celular</button><button class="btn" onclick="carregarNotificacoes()">Atualizar</button><button class="btn gray" onclick="marcarTodasLidas()">Marcar todas como lidas</button></div><div class="notifList">${notificacoesMP.length?notificacoesMP.map(n=>`<div class="${n.lida?'box':'notifBox'}"><b>${n.titulo||'Notificação'}</b><br>${n.mensagem||''}<br><span class="small">Pedido #${n.pedido_id||''} • ${n.criado_em?new Date(n.criado_em).toLocaleString('pt-BR'):''}</span><br>${n.lida?'':'<button class="btn gray" onclick="marcarNotificacaoLida('+n.id+')">Marcar lida</button>'}</div>`).join(''):'<p>Nenhuma notificação ainda.</p>'}</div>`;
if(tab=='pdv')el.innerHTML=`<h3>🧾 Venda Balcão / PDV</h3><p class="small">Use para vendas presenciais no balcão. Entra no fechamento do dia como venda feita.</p><div class="wrap" style="grid-template-columns:1fr 360px;padding:0"><main><input class="field" id="buscaPDV" placeholder="Buscar produto no PDV..." oninput="renderAdmin()"><div class="grid">${produtosBanco.filter(p=>p.ativo!==false).filter(p=>{const q=(document.getElementById('buscaPDV')?.value||'').toLowerCase();return (String(p.nome||'')+String(p.categoria||'')).toLowerCase().includes(q)}).map(p=>`<div class="card"><div class="photo">${p.emoji||'🍽️'}</div><div class="tag">${p.categoria||''}</div><h3>${p.nome||''}</h3><div class="price">${money(p.preco)}</div><button class="btn green" onclick="addPDV(${p.id},'${String(p.nome||'').replaceAll("'","\\'")}',${Number(p.preco||0)})">Adicionar</button></div>`).join('')}</div></main><aside style="position:static"><div class="box"><h3>🛒 Venda atual</h3><input id="pdvCliente" class="field" placeholder="Nome do cliente (opcional)"><div>${carrinhoPDV.length?carrinhoPDV.map(i=>`<div class="item"><div class="row"><b>${i.qty}x ${i.nome}</b><span>${money(i.preco*i.qty)}</span></div><div class="row"><button class="btn gray" onclick="addPDV(${i.id},'${String(i.nome||'').replaceAll("'","\\'")}',${i.preco})">+</button><button class="btn gray" onclick="menosPDV(${i.id})">-</button></div></div>`).join(''):'<p class="small">Nenhum produto adicionado.</p>'}</div><select id="pdvPagamento" class="field"><option>PIX</option><option>Dinheiro</option><option>Cartão</option></select><div class="total"><div class="row"><span>Total</span><b style="font-size:22px">${money(totalPDV())}</b></div></div><button class="btn green" style="width:100%;padding:14px;margin-top:8px" onclick="finalizarPDV()">Finalizar venda</button><button class="btn gray" style="width:100%;padding:12px;margin-top:8px" onclick="imprimirPDV()">Imprimir prévia</button></div></aside></div>`;
