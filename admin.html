let configLoja=null;
async function carregarConfigAdmin(){
 const {data,error}=await db.from('configuracoes').select('*').order('id',{ascending:false}).limit(1).maybeSingle();
 if(!error) configLoja=data;
}
async function salvarConfigAdmin(){

 if(configLoja && configLoja.id){
   const {error}=await db.from('configuracoes').update({banner,promocao_dia,atualizado_em:new Date().toISOString()}).eq('id',configLoja.id);
   if(error){alert('Erro: '+error.message);return}
 }else{
   const {error}=await db.from('configuracoes').insert([{banner,promocao_dia}]);
   if(error){alert('Erro: '+error.message);return}
 }
 await carregarConfigAdmin(); renderAdmin(); alert('Visual salvo!');
}

async function uploadFotoProduto(id){
 const input=document.getElementById('fotoUpload_'+id);
 if(!input || !input.files || !input.files[0]){alert('Escolha uma imagem primeiro');return}
 const file=input.files[0];
 const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
 const path='produto_'+id+'_'+Date.now()+'.'+ext;
 const {error:uploadError}=await db.storage.from('produtos').upload(path,file,{cacheControl:'3600',upsert:true});
 if(uploadError){alert('Erro ao enviar imagem: '+uploadError.message);console.log(uploadError);return}
 const {data}=db.storage.from('produtos').getPublicUrl(path);
 const publicUrl=data.publicUrl;
 const {error:updateError}=await db.from('produtos').update({foto:publicUrl,storage_path:path}).eq('id',id);
 if(updateError){alert('Imagem enviada, mas erro ao salvar no produto: '+updateError.message);return}
 alert('Foto do produto atualizada!');
 await carregarProdutosAdminBanco();
 renderAdmin();
}

async function marcarBooleanProduto(id,campo,valorAtual){

 if(error){alert('Erro: '+error.message);return}
 await carregarProdutosAdminBanco();carregarConfigAdmin(); renderAdmin();
}

async function carregarProdutosAdminBanco(){

async function alternarProdutoBanco(id,ativoAtual){

async function salvarProdutoBanco(id,campo,valor){
 let obj={}; obj[campo]=(campo==='preco')?Number(valor||0):valor;
 const {error}=await db.from('produtos').update(obj).eq('id',id);
 if(error){alert('Erro ao salvar produto: '+error.message);return}
}

function renderAdmin(){const el=document.getElementById('adminContent');if(!el||!adminLogado)return;const valid=orders.filter(o=>o.status!='Cancelado'),total=valid.reduce((s,o)=>s+Number(o.total||0),0),pix=valid.filter(o=>o.pagamento=='PIX').reduce((s,o)=>s+Number(o.total||0),0),dinheiro=valid.filter(o=>o.pagamento=='Dinheiro').reduce((s,o)=>s+Number(o.total||0),0),cartao=valid.filter(o=>o.pagamento=='Cartão').reduce((s,o)=>s+Number(o.total||0),0);if(tab=='pedidos')el.innerHTML=`<div class="adminControls"><button class="btn green" onclick="loadOrders()">Atualizar pedidos</button><button class="btn" onclick="alternarSom()">Som: ${somAtivo?'Ligado':'Desligado'}</button><button class="btn gray" onclick="window.open('./','_blank')">Ver site cliente</button></div><div class="cards"><div class="metric">Pedidos<br><b>${orders.length}</b></div><div class="metric">Vendas<br><b>${money(total)}</b></div><div class="metric">Recebidos<br><b>${orders.filter(o=>o.status=='Recebido').length}</b></div><div class="metric">Preparando<br><b>${orders.filter(o=>o.status=='Preparando').length}</b></div></div><table class="table"><tr><th>Nº</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Pagamento</th><th>Status</th><th>Ações</th></tr>${orders.map(o=>`<tr><td>#${o.id}</td><td>${o.cliente||''}<div class="small">${o.telefone||''}<br>${o.endereco||''}</div></td><td>${o.itens||''}</td><td>${money(o.total)}</td><td>${o.pagamento||''}</td><td><select onchange="updateOrderStatus(${o.id},this.value)"><option ${o.status=='Recebido'?'selected':''}>Recebido</option><option ${o.status=='Preparando'?'selected':''}>Preparando</option><option ${o.status=='Saiu para entrega'?'selected':''}>Saiu para entrega</option><option ${o.status=='Entregue'?'selected':''}>Entregue</option><option ${o.status=='Cancelado'?'selected':''}>Cancelado</option></select></td><td><button class="btn gray" onclick="imprimirPedido(${o.id})">Imprimir</button><br><button class="btn green" onclick="reciboCliente(${o.id})">Recibo</button></td></tr>`).join('')}</table>`;if(tab=='loja')el.innerHTML=`<div class="cards"><button class="btn green" onclick="setOpen(true)">Abrir loja</button><button class="btn red" onclick="setOpen(false)">Fechar loja</button><button class="btn" onclick="deliveryFee=0;renderAdmin()">Entrega grátis</button><button class="btn" onclick="deliveryFee=10;renderAdmin()">Taxa R$10</button></div><p><b>Taxa atual:</b> ${deliveryFee==0?'Grátis':money(deliveryFee)}</p><label>Tempo estimado para informar ao cliente</label><input class="field" value="${tempoEstimado}" onchange="tempoEstimado=this.value"><p><b>WhatsApp:</b> +55 34 8719-6724</p><p><b>PIX:</b> ${PIX}</p>`;if(tab=='produtos')el.innerHTML=`<h3>📦 Produtos indisponíveis</h3><p class="small">Controle inicial local. Na próxima versão ligamos isso ao banco para refletir no site do cliente automaticamente.</p><table class="table"><tr><th>Produto/Categoria</th><th>Status</th><th>Ação</th></tr>${produtosAdmin.map(p=>`<tr><td>${p}</td><td>${produtosPausados.includes(p)?'<span class="badge">Pausado</span>':'<span class="badge">Ativo</span>'}</td><td><button class="btn ${produtosPausados.includes(p)?'green':'red'}" onclick="alternarProduto('${p}')">${produtosPausados.includes(p)?'Ativar':'Pausar'}</button></td></tr>`).join('')}</table>`;
if(tab=='produtos')el.innerHTML=`<h3>📦 Produtos do cardápio</h3><p class="small">Pausar, editar preço e colocar foto produto por produto. Use link de imagem por enquanto.</p><div class="adminControls"><button class="btn green" onclick="carregarProdutosAdminBanco().then(renderAdmin)">Atualizar produtos</button><button class="btn" onclick="importarCardapioInicial()">Importar cardápio inicial</button></div><div class="box" style="margin:10px 0"><h3>Novo produto</h3><input id="novoNome" class="field" placeholder="Nome"><input id="novoCategoria" class="field" placeholder="Categoria"><input id="novoPreco" class="field" type="number" placeholder="Preço"><input id="novoEmoji" class="field" placeholder="Emoji ex: 🍝"><textarea id="novoDescricao" class="field" placeholder="Descrição"></textarea><button class="btn green" onclick="novoProdutoBanco()">Cadastrar produto</button></div><table class="table"><tr><th>Produto</th><th>Categoria</th><th>Preço</th><th>Foto</th><th>Status</th><th>Selos</th><th>Ação</th></tr>${produtosBanco.map(p=>`<tr><td><input class="field" value="${p.nome||''}" onchange="salvarProdutoBanco(${p.id},'nome',this.value)"><textarea class="field" onchange="salvarProdutoBanco(${p.id},'descricao',this.value)">${p.descricao||''}</textarea></td><td><input class="field" value="${p.categoria||''}" onchange="salvarProdutoBanco(${p.id},'categoria',this.value)"></td><td><input class="field" type="number" value="${p.preco||0}" onchange="salvarProdutoBanco(${p.id},'preco',this.value)"></td><td><input class="field" placeholder="Link da foto" value="${p.foto||''}" onchange="salvarProdutoBanco(${p.id},'foto',this.value)"><input id="fotoUpload_${p.id}" class="field" type="file" accept="image/*"><button class="btn green" onclick="uploadFotoProduto(${p.id})">Enviar foto</button>${p.foto?`<br><img src="${p.foto}" style="width:90px;height:70px;object-fit:cover;border-radius:10px;margin-top:6px">`:''}</td><td>${p.ativo?'<span class="badge">Ativo</span>':'<span class="badge">Pausado</span>'}</td><td><button class="btn gray" onclick="marcarBooleanProduto(${p.id},'destaque',${p.destaque===true})">${p.destaque?'Remover destaque':'Destaque'}</button><br><button class="btn gray" onclick="marcarBooleanProduto(${p.id},'promocao',${p.promocao===true})">${p.promocao?'Remover promoção':'Promoção'}</button></td><td><button class="btn ${p.ativo?'red':'green'}" onclick="alternarProdutoBanco(${p.id},${p.ativo})">${p.ativo?'Pausar':'Ativar'}</button></td></tr>`).join('')}</table>`;
if(tab=='visual')el.innerHTML=`<h3>🖼 Visual da loja</h3><p class="small">Coloque link de imagem para banner. As fotos dos produtos agora podem ser enviadas direto na aba Produtos.</p><label>Link do banner principal</label><input id="cfgBanner" class="field" value="${configLoja?.banner||''}" placeholder="https://..."><label>Texto da promoção/frase principal</label><textarea id="cfgPromocao" class="field" placeholder="Ex: Sua fome merece MP Delícias">${configLoja?.promocao_dia||''}</textarea><button class="btn green" onclick="salvarConfigAdmin()">Salvar visual</button>${configLoja?.banner?`<h3>Prévia</h3><img src="${configLoja.banner}" style="max-width:100%;border-radius:18px">`:''}`;
if(tab=='financeiro')el.innerHTML=`<div class="cards"><div class="metric">Total<br><b>${money(total)}</b></div><div class="metric">PIX<br><b>${money(pix)}</b></div><div class="metric">Dinheiro<br><b>${money(dinheiro)}</b></div><div class="metric">Cartão<br><b>${money(cartao)}</b></div></div><label>Gastos do dia</label><input class="field" type="number" value="${expense}" onchange="expense=Number(this.value);renderAdmin()"><h3>Lucro estimado: ${money(total-expense)}</h3><button class="btn green" onclick="closeDay()">Fechar dia e salvar</button>`}
setInterval(()=>{if(adminLogado)loadOrders()},15000);
</script></body></html>
